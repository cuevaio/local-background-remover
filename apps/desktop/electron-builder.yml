appId: com.backgroundrm.desktop
productName: Local Background Remover
directories:
  output: dist-packages
files:
  - dist/**
  - package.json
extraResources:
  - from: build-resources/rmbg
    to: rmbg
    filter:
      - "**/*"
artifactName: local-background-remover-v${version}-darwin-${arch}.${ext}
electronVersion: 41.1.0
mac:
  binaries:
    - build-resources/rmbg/rmbg
  target:
    - dmg
    - zip
  category: public.app-category.photography
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  hardenedRuntime: true
