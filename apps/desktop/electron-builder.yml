appId: com.backgroundrm.desktop
productName: Local Background Remover
directories:
  output: dist-packages
files:
  - dist/**
  - package.json
extraResources:
  - from: ../rmbg/dist/rmbg
    to: rmbg
artifactName: local-background-remover-v${version}-darwin-${arch}.${ext}
electronVersion: 41.1.0
mac:
  target:
    - dmg
  category: public.app-category.photography
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  hardenedRuntime: true
afterPack: ./scripts/prune-mac-updater-frameworks.mjs
