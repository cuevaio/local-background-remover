name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-cli:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync Python dependencies
        working-directory: apps/rmbg
        run: uv sync --group build

      - name: Validate version matches git tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PROJECT_VERSION="$(cd apps/rmbg && uv run python -c "import importlib.metadata as m; print(m.version('rmbg'))")"
          if [[ "v${PROJECT_VERSION}" != "${TAG}" ]]; then
            echo "Tag ${TAG} does not match pyproject version v${PROJECT_VERSION}" >&2
            exit 1
          fi

      - name: Build packaged CLI
        working-directory: apps/rmbg
        run: bash scripts/build-binary.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmbg-${{ matrix.target }}
          path: apps/rmbg/dist/release/*.tar.gz

  build-desktop:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Validate desktop version matches git tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PROJECT_VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          if [[ "v${PROJECT_VERSION}" != "${TAG}" ]]; then
            echo "Tag ${TAG} does not match desktop package version v${PROJECT_VERSION}" >&2
            exit 1
          fi

      - name: Build desktop installers
        working-directory: apps/desktop
        env:
          RMBG_REQUIRE_MAC_SIGNING: "true"
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run dist:mac

      - name: Verify signed desktop app
        shell: bash
        run: |
          shopt -s nullglob
          APP_PATH="apps/desktop/dist-packages/mac-arm64/Local Background Remover.app"
          DMG_FILES=(apps/desktop/dist-packages/local-background-remover-v*.dmg)
          if [[ ! -d "${APP_PATH}" ]]; then
            echo "Missing built app bundle: ${APP_PATH}" >&2
            exit 1
          fi
          if [[ ${#DMG_FILES[@]} -ne 1 ]]; then
            echo "Expected exactly one DMG artifact, found ${#DMG_FILES[@]}" >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          spctl --assess --type execute --verbose=4 "${APP_PATH}"
          xcrun stapler validate "${APP_PATH}"
          xcrun stapler validate "${DMG_FILES[0]}"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-darwin-arm64
          path: |
            apps/desktop/dist-packages/*.dmg
            apps/desktop/dist-packages/*.zip

  publish:
    needs:
      - build-cli
      - build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-assets

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          shopt -s nullglob
          files=( *.tar.gz *.dmg *.zip )
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release assets found to checksum" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.tar.gz
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/checksums.txt
